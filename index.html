<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Cup Pool 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --pitch: #0a2e1a;
    --pitch-mid: #0f3d22;
    --pitch-light: #155230;
    --gold: #f0b429;
    --gold-dim: #c48f00;
    --white: #f5f2eb;
    --whitish: #8bca8b;
    --muted: #8faa98;
    --danger: #e05252;
    --info: #4da6ff;
    --card-bg: #0d3520;
    --card-border: #1e5c37;
    --input-bg: #0a2e1a;
    --radius: 10px;
    --font-display: 'Bebas Neue', sans-serif;
    --font-body: 'DM Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--pitch);
    color: var(--white);
    font-family: var(--font-body);
    min-height: 100vh;
    font-size: 15px;
    line-height: 1.5;
  }

  /* ── HEADER ── */
  #app-header {
    background: var(--pitch-mid);
    border-bottom: 2px solid var(--gold);
    padding: 12px 16px 10px;
    text-align: center;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  #app-header h1 {
    font-family: var(--font-display);
    font-size: 28px;
    letter-spacing: 2px;
    color: var(--gold);
    line-height: 1;
  }
  #app-header p {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-top: 2px;
  }

  /* ── NAV ── */
  #nav {
    display: flex;
    overflow-x: auto;
    gap: 4px;
    padding: 10px 12px;
    background: var(--pitch-mid);
    border-bottom: 1px solid var(--card-border);
    scrollbar-width: none;
  }
  #nav::-webkit-scrollbar { display: none; }
  .nav-btn {
    flex-shrink: 0;
    background: transparent;
    border: 1px solid var(--card-border);
    color: var(--muted);
    font-family: var(--font-body);
    font-size: 12px;
    font-weight: 500;
    padding: 6px 12px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .nav-btn.active {
    background: var(--gold);
    border-color: var(--gold);
    color: var(--pitch);
    font-weight: 600;
  }
  .nav-btn:hover:not(.active) {
    border-color: var(--gold);
    color: var(--white);
  }

  /* ── PAGE CONTAINER ── */
  #page {
    max-width: 600px;
    margin: 0 auto;
    padding: 16px 14px 80px;
  }

  /* ── CARDS ── */
  .card {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: var(--radius);
    padding: 14px;
    margin-bottom: 12px;
  }
  .card-title {
    font-family: var(--font-display);
    font-size: 18px;
    letter-spacing: 1.5px;
    color: var(--gold);
    margin-bottom: 10px;
  }

  /* ── FORMS ── */
  label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 4px;
    margin-top: 12px;
  }
  input[type="text"], input[type="password"], select, textarea {
    width: 100%;
    background: var(--pitch);
    border: 1px solid var(--card-border);
    border-radius: 7px;
    color: var(--white);
    font-family: var(--font-body);
    font-size: 15px;
    padding: 9px 11px;
    outline: none;
    transition: border-color 0.15s;
  }
  input:focus, select:focus, textarea:focus {
    border-color: var(--gold);
  }
  select option { background: var(--pitch-mid); }

  .btn {
    display: inline-block;
    background: var(--gold);
    color: var(--pitch);
    font-family: var(--font-body);
    font-size: 14px;
    font-weight: 700;
    padding: 10px 20px;
    border-radius: 7px;
    border: none;
    cursor: pointer;
    transition: opacity 0.15s;
    margin-top: 14px;
    letter-spacing: 0.5px;
  }
  .btn:hover { opacity: 0.88; }
  .btn:active { opacity: 0.75; }
  .btn.danger {
    background: var(--danger);
    color: #fff;
  }
  .btn.secondary {
    background: transparent;
    border: 1px solid var(--card-border);
    color: var(--white);
  }
  .btn.full { width: 100%; text-align: center; }

  /* ── TIER BADGES ── */
  .tier-badge {
    display: inline-block;
    font-size: 10px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 10px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .tier-1 { background: #f0b42933; color: var(--gold); border: 1px solid var(--gold-dim); }
  .tier-2 { background: #4da6ff22; color: var(--info); border: 1px solid #4da6ff66; }
  .tier-3 { background: #8faa9822; color: var(--muted); border: 1px solid #8faa9844; }

  /* ── TEAM SELECTOR ── */
  .team-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 7px;
    margin-top: 8px;
  }
  .team-chip {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    border: 1px solid var(--card-border);
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.12s;
    font-size: 13px;
    background: var(--pitch);
    user-select: none;
  }
  .team-chip:hover { border-color: var(--gold); }
  .team-chip.selected {
    background: var(--gold);
    color: var(--pitch);
    border-color: var(--gold);
    font-weight: 600;
  }
  .team-chip.disabled {
    opacity: 0.35;
    cursor: not-allowed;
    pointer-events: none;
  }
  .flag { font-size: 18px; line-height: 1; }

  /* ── LEADERBOARD ── */
  .lb-row {
    display: flex;
    align-items: center;
    padding: 10px 12px;
    border-bottom: 1px solid var(--card-border);
    gap: 10px;
  }
  .lb-row:last-child { border-bottom: none; }
  .lb-rank {
    font-family: var(--font-display);
    font-size: 20px;
    color: var(--muted);
    width: 26px;
    text-align: center;
    flex-shrink: 0;
  }
  .lb-rank.top { color: var(--gold); }
  .lb-name { flex: 1; font-weight: 500; }
  .lb-teams { font-size: 11px; color: var(--muted); }
  .lb-score {
    font-family: var(--font-display);
    font-size: 24px;
    color: var(--gold);
    min-width: 40px;
    text-align: right;
  }

  /* ── MATCH TABLE ── */
  .group-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .group-table th {
    text-align: left;
    color: var(--muted);
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.7px;
    padding: 5px 6px;
    border-bottom: 1px solid var(--card-border);
  }
  .group-table td {
    padding: 7px 6px;
    border-bottom: 1px solid #1e5c3733;
  }
  .group-table tr:last-child td { border-bottom: none; }
  .pts-cell {
    font-family: var(--font-display);
    font-size: 16px;
    color: var(--gold);
    text-align: center;
  }
  .advanced-badge {
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 8px;
    background: #1d5c3744;
    color: #5dca90;
    border: 1px solid #5dca9066;
  }

  /* ── BRACKET ── */
  .bracket-round { margin-bottom: 16px; }
  .bracket-round h3 {
    font-family: var(--font-display);
    font-size: 14px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .bracket-matchup {
    background: var(--pitch);
    border: 1px solid var(--card-border);
    border-radius: 8px;
    overflow: hidden;
    margin-bottom: 6px;
  }
  .bracket-team {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 12px;
    font-size: 13px;
  }
  .bracket-team + .bracket-team { border-top: 1px solid var(--card-border); }
  .bracket-team.winner {
    background: #f0b42915;
    color: var(--gold);
    font-weight: 600;
  }

  /* ── PICK POPULARITY ── */
  .pop-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 0;
    border-bottom: 1px solid #1e5c3733;
  }
  .pop-row:last-child { border-bottom: none; }
  .pop-bar-wrap {
    flex: 1;
    background: var(--pitch);
    border-radius: 4px;
    height: 6px;
    overflow: hidden;
  }
  .pop-bar {
    height: 100%;
    background: var(--gold);
    border-radius: 4px;
    transition: width 0.4s ease;
  }
  .pop-count {
    font-family: var(--font-display);
    font-size: 16px;
    color: var(--gold);
    min-width: 20px;
    text-align: right;
  }

  /* ── ADMIN SCORE EDITOR ── */
  .score-row {
    display: grid;
    grid-template-columns: 1fr 40px auto 40px 1fr;
    align-items: center;
    gap: 6px;
    padding: 8px 0;
    border-bottom: 1px solid #1e5c3733;
    font-size: 13px;
  }
  .score-row:last-child { border-bottom: none; }
  .score-team { text-align: center; }
  .score-input {
    width: 40px !important;
    text-align: center;
    padding: 5px 4px !important;
    font-size: 16px !important;
    font-family: var(--font-display) !important;
    letter-spacing: 1px;
  }
  .vs-label {
    text-align: center;
    color: var(--muted);
    font-size: 11px;
    font-weight: 600;
  }

  /* ── ALERTS ── */
  .alert {
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 13px;
    margin-bottom: 12px;
  }
  .alert.success { background: #1d5c3744; border: 1px solid #5dca9066; color: #5dca90; }
  .alert.error { background: #e0525222; border: 1px solid var(--danger); color: var(--danger); }
  .alert.info { background: #4da6ff15; border: 1px solid #4da6ff44; color: var(--info); }

  /* ── RULES ── */
  .rules-section h3 {
    font-family: var(--font-display);
    font-size: 16px;
    letter-spacing: 1.5px;
    color: var(--gold);
    margin: 16px 0 6px;
  }
  .rules-section p, .rules-section li {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.7;
  }
  .rules-section ul { padding-left: 16px; }
  .rules-section li { margin-bottom: 4px; }
  .score-table { width: 100%; font-size: 13px; }
  .score-table td { padding: 5px 8px; border-bottom: 1px solid #1e5c3733; }
  .score-table td:last-child { text-align: right; color: var(--gold); font-weight: 600; }
  .score-table tr:last-child td { border-bottom: none; }

  /* ── MISC ── */
  .page-title {
    font-family: var(--font-display);
    font-size: 26px;
    letter-spacing: 2px;
    color: var(--white);
    margin-bottom: 14px;
  }
  .tag-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
  .tag {
    font-size: 11px;
    padding: 3px 9px;
    border-radius: 10px;
    background: #1e5c37;
    color: #7fccab;
    font-weight: 500;
  }
  .divider { border: none; border-top: 1px solid var(--card-border); margin: 14px 0; }
  .empty-state {
    text-align: center;
    color: var(--muted);
    padding: 40px 20px;
    font-size: 14px;
  }
  .counter-display {
    display: flex;
    gap: 10px;
    margin-bottom: 12px;
  }
  .counter-pill {
    flex: 1;
    text-align: center;
    padding: 8px;
    border-radius: 8px;
    border: 1px solid var(--card-border);
    background: var(--pitch);
  }
  .counter-pill .c-num {
    font-family: var(--font-display);
    font-size: 22px;
  }
  .counter-pill .c-label {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .counter-pill.t1 .c-num { color: var(--gold); }
  .counter-pill.t2 .c-num { color: var(--info); }
  .counter-pill.t3 .c-num { color: var(--muted); }
  .step-indicator {
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }
  .match-list { display: flex; flex-direction: column; gap: 6px; }
  .match-item {
    background: var(--pitch);
    border: 1px solid var(--card-border);
    border-radius: 8px;
    padding: 10px 12px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
  }
  .match-result {
    font-family: var(--font-display);
    font-size: 18px;
    color: var(--gold);
    min-width: 50px;
    text-align: center;
  }
  .match-team { flex: 1; }
  .match-team.right { text-align: right; }

  /* ── KNOCKOUT BRACKET PAGE ── */
  .ko-round-header {
    font-family: var(--font-display);
    font-size: 13px;
    letter-spacing: 2px;
    color: var(--gold);
    text-transform: uppercase;
    padding: 6px 0 8px;
    margin-top: 4px;
  }
  .ko-match {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 9px;
    overflow: hidden;
    margin-bottom: 8px;
  }
  .ko-team {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    font-size: 14px;
    gap: 8px;
  }
  .ko-team + .ko-team {
    border-top: 1px solid var(--card-border);
  }
  .ko-team.winner {
    background: rgba(240,180,41,0.1);
    color: var(--gold);
    font-weight: 600;
  }
  .ko-team.loser {
    color: #556b5e;
  }
  .ko-team-name { flex: 1; }
  .ko-score {
    font-family: var(--font-display);
    font-size: 20px;
    min-width: 26px;
    text-align: right;
  }
  .ko-team.winner .ko-score { color: var(--gold); }
  .ko-team.loser .ko-score { color: #445544; }
  .ko-tbd { color: var(--muted); font-style: italic; font-size: 13px; }
  .ko-match-date {
    font-size: 10px;
    color: var(--muted);
    padding: 4px 14px;
    background: rgba(0,0,0,0.2);
    border-top: 1px solid var(--card-border);
    letter-spacing: 0.5px;
  }

  /* ── TEAM STATUS COLORS ── */
  .team-alive { color: #8bca8b; }
  .team-eliminated { color: #8faa98; }

  /* ── ADMIN KNOCKOUT IMPROVED ── */
  .ko-admin-match {
    background: var(--pitch);
    border: 1px solid var(--card-border);
    border-radius: 9px;
    padding: 10px 12px;
    margin-bottom: 8px;
  }
  .ko-admin-teams {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }
  .ko-admin-scores {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 8px;
  }
  .ko-match-num {
    font-size: 10px;
    color: var(--muted);
    text-align: center;
    margin-bottom: 6px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.7px;
  }
</style>
</head>

// ── SCORING ENGINE ──
function computeScores(data) {
  const scores = {}; // participantName -> score

  data.participants.forEach(p => {
    let score = 0;
    const picks = new Set(p.picks);

    // Group stage match points
    Object.values(data.groupMatches).forEach(m => {
      if (!m.played) return;
      const hs = parseInt(m.homeScore) || 0;
      const as = parseInt(m.awayScore) || 0;
      if (picks.has(m.home)) {
        if (hs > as) score += 3;
        else if (hs === as) score += 1;
      }
      if (picks.has(m.away)) {
        if (as > hs) score += 3;
        else if (hs === as) score += 1;
      }
    });

    // Advancement points
    Object.entries(data.advancement).forEach(([teamId, info]) => {
      if (!picks.has(teamId)) return;
      if (info.advanced) score += 1;
      if (info.groupWinner) score += 1;
    });

    // Knockout round points — works with both old and new match ID formats
    const KO_PTS = { r32: 4, r16: 6, qf: 10, sf: 16, final: 24, third: 0 };
    Object.entries(data.knockoutMatches).forEach(([mid, m]) => {
      if (!m.played) return;
      const hs = parseInt(m.homeScore) || 0;
      const as = parseInt(m.awayScore) || 0;
      // Determine round from stored round field or parse from ID
      const roundKey = m.round || mid.split('_')[0];
      const pts = KO_PTS[roundKey] || 0;
      if (picks.has(m.home) && hs > as) score += pts;
      if (picks.has(m.away) && as > hs) score += pts;
    });

    scores[p.name] = score;
  });
  return scores;
}

// ── LEADERBOARD ──
function leaderboard(el) {
  const data = getData();
  const scores = computeScores(data);
  const sorted = data.participants
  .map(p => ({ ...p, score: scores[p.name] || 0 }))
  .sort((a, b) => b.score - a.score);

const showPicks = canViewPicks();

  el.innerHTML = `<h2 class="page-title">Leaderboard</h2>`;
 if (!showPicks) {
    el.innerHTML += `
      <div class="card">
        🔒 Picks are hidden until you submit an entry or tournament kickoff.
      </div>
    `;
  }
  if (sorted.length === 0) {
    el.innerHTML += `<div class="empty-state">No participants yet.<br>Be the first to enter your picks!</div>`;
    return;
  }

  // Determine which teams are still alive in the knockout bracket
  // A team is "alive" if they advanced to the knockout stage and haven't yet lost a knockout match
  const advancedTeams = new Set(
    Object.entries(data.advancement)
      .filter(([, info]) => info.advanced)
      .map(([id]) => id)
  );

  // Teams that have lost a knockout match are eliminated
  const eliminatedInKO = new Set();
  Object.values(data.knockoutMatches).forEach(m => {
    if (!m.played) return;
    const hs = parseInt(m.homeScore) || 0;
    const as = parseInt(m.awayScore) || 0;
    if (hs > as) eliminatedInKO.add(m.away);
    else if (as > hs) eliminatedInKO.add(m.home);
    // draws shouldn't happen in KO but if so, neither eliminated yet
  });

  // A team is "alive" = advanced AND not eliminated in KO
  // A team is "eliminated" = didn't advance OR lost in KO
  const knockoutStarted = Object.keys(data.knockoutMatches).length > 0;

  function isTeamAlive(teamId) {
    if (!advancedTeams.has(teamId)) return false; // didn't make it
    if (eliminatedInKO.has(teamId)) return false; // lost in KO
    return true;
  }

  function isTeamEliminated(teamId) {
    // Not advanced means eliminated after group stage
    if (advancedTeams.size > 0 && !advancedTeams.has(teamId)) return true;
    // Lost a KO match
    if (eliminatedInKO.has(teamId)) return true;
    return false;
  }

  // Compute per-team group stage points (pool scoring, not FIFA pts)
  const teamPoolPts = {};
  Object.values(data.groupMatches).forEach(m => {
    if (!m.played) return;
    const hs = parseInt(m.homeScore) || 0;
    const as = parseInt(m.awayScore) || 0;
    if (!(m.home in teamPoolPts)) teamPoolPts[m.home] = 0;
    if (!(m.away in teamPoolPts)) teamPoolPts[m.away] = 0;
    if (hs > as) teamPoolPts[m.home] += 3;
    else if (hs === as) { teamPoolPts[m.home] += 1; teamPoolPts[m.away] += 1; }
    else teamPoolPts[m.away] += 3;
  });
  // Add KO points to team pool pts for display
  const KO_PTS = { r32: 4, r16: 6, qf: 10, sf: 16, final: 24 };
  Object.values(data.knockoutMatches).forEach(m => {
    if (!m.played) return;
    const hs = parseInt(m.homeScore) || 0;
    const as = parseInt(m.awayScore) || 0;
    if (!(m.home in teamPoolPts)) teamPoolPts[m.home] = 0;
    if (!(m.away in teamPoolPts)) teamPoolPts[m.away] = 0;
    const pts = KO_PTS[m.round] || 0;
    if (hs > as) teamPoolPts[m.home] += pts;
    else if (as > hs) teamPoolPts[m.away] += pts;
  });

  const card = document.createElement('div');
  card.className = 'card';

  // Header row
  const headerRow = document.createElement('div');
  headerRow.style.cssText = 'display:flex; align-items:center; padding:4px 12px 8px; gap:10px; border-bottom:1px solid var(--card-border); margin-bottom:2px;';
  headerRow.innerHTML = `
    <div style="width:26px; flex-shrink:0;"></div>
    <div style="flex:1; min-width:0;"></div>
    <div style="font-size:10px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:0.7px; min-width:40px; text-align:right;">Total</br>Points</div>
    <div style="font-size:10px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:0.7px; min-width:36px; text-align:right;" title="Teams still alive in the tournament">Teams</br>Left</div>`;
  card.appendChild(headerRow);

  sorted.forEach((p, i) => {
    // Build team display — green if alive, gray if eliminated
    let teamDisplay;
    if (showPicks) {
      const teamParts = p.picks.map(id => {
        const t = getTeam(id);
        if (!t) return '';
        const pts = teamPoolPts[id] || 0;
        const alive = isTeamAlive(id);
        const elim = isTeamEliminated(id);
        let nameStr;
        if (alive) {
          nameStr = `<strong style="color:#8bca8b">${t.name}</strong>`;
          return `${nameStr} <span style="color:#8bca8b">(${pts})</span>`;
        } else if (elim) {
          nameStr = `<s><span style="color:#8faa98">${t.name}</span></s>`;
          return `${nameStr} <span style="color:#8faa98">(${pts})</span>`;
        } else {
          nameStr = `<span style="color:var(--muted)">${t.name}</span>`;
          return `${nameStr} <span style="color:var(--muted)">(${pts})</span>`;
        }
        //return `${nameStr} <span style="color:#445544">(${pts})</span>`;
      }).filter(Boolean);
      teamDisplay = teamParts.join(' · ');
    } else {
      teamDisplay = '🔒 Hidden';
    }

    // Teams Left = count of this person's picks still alive
    const teamsLeft = showPicks
      ? p.picks.filter(id => isTeamAlive(id)).length
      : '—';

    const row = document.createElement('div');
    row.className = 'lb-row';
    row.innerHTML = `
      <div class="lb-rank ${i < 3 ? 'top' : ''}">${i + 1}</div>
      <div style="flex:1; min-width:0;">
        <div class="lb-name">${p.name}</div>
        <div class="lb-teams" style="overflow:hidden; text-overflow:ellipsis;">${teamDisplay}</div>
      </div>
      <div class="lb-score">${p.score}</div>
      <div style="font-family:var(--font-display); font-size:18px; color:${teamsLeft > 0 ? '#5dca90' : 'var(--muted)'}; min-width:36px; text-align:right;">${teamsLeft}</div>`;
    card.appendChild(row);
  });

  el.appendChild(card);
}

  if (!hasAny) {

  } else {

      const roundDiv = document.createElement('div');
      roundDiv.className = 'bracket-round';
      roundDiv.innerHTML = `<h3>${r.label}</h3>`;
      rm.forEach(m => {
        const hs = m.played ? parseInt(m.homeScore) || 0 : null;
        const as = m.played ? parseInt(m.awayScore) || 0 : null;
        const hw = m.played && hs > as;
        const aw = m.played && as > hs;

        const away = getTeam(m.away);
        roundDiv.innerHTML += `
          <div class="bracket-matchup">

      koDiv.appendChild(roundDiv);
    });
  }
  el.appendChild(koDiv);
}

function getMatchData(data, matchId) {
  // Check saved knockoutMatches first
  if (data.knockoutMatches && data.knockoutMatches[matchId]) {
    return data.knockoutMatches[matchId];
  }
  // Fall back to default bracket teams (R32 only)
  const def = DEFAULT_BRACKET_TEAMS[matchId];
  if (def) return { home: def.home, away: def.away, homeScore: '', awayScore: '', played: false };
  return { home: '', away: '', homeScore: '', awayScore: '', played: false };
}

function knockout(el) {
  const data = getData();
  el.innerHTML = '';

  const header = document.createElement('div');
  header.style.cssText = 'display:flex; align-items:center; justify-content:space-between; padding:12px 2px 8px;';

function renderBracketList(el, data) {
  const rounds = [
    { key:'r32',   label:'Round of 32' },
    { key:'r16',   label:'Round of 16' },
    { key:'qf',    label:'Quarter-Finals' },
    { key:'sf',    label:'Semi-Finals' },
    { key:'final', label:'Final' },
    { key:'third', label:'3rd Place' },
  ];

  const eliminatedInKO = getEliminatedTeams(data);

  rounds.forEach(r => {
    const matchIds = BRACKET_STRUCTURE.filter(b => b.round === r.key).map(b => b.id);
    const uniqueIds = [...new Set(matchIds)];
    if (uniqueIds.length === 0) return;

    const section = document.createElement('div');
    section.innerHTML = `<div class="ko-round-header">${r.label}</div>`;

    uniqueIds.forEach(mid => {
      const m = getMatchData(data, mid);
      if (!m.home && !m.away) return;
      section.appendChild(renderMatchCard(m, mid, eliminatedInKO));
    });

    el.appendChild(section);
  });
}

function getEliminatedTeams(data) {
  const elim = new Set();
  if (!data.knockoutMatches) return elim;
  Object.values(data.knockoutMatches).forEach(m => {
    if (!m.played) return;
    const hs = parseInt(m.homeScore) || 0;
    const as = parseInt(m.awayScore) || 0;
    if (hs > as) elim.add(m.away);
    else if (as > hs) elim.add(m.home);
  });
  return elim;
}

function renderMatchCard(m, matchId, eliminatedInKO) {
  const hs = m.played ? (parseInt(m.homeScore) ?? '') : '';
  const as = m.played ? (parseInt(m.awayScore) ?? '') : '';
  const homeWon = m.played && hs > as;
  const awayWon = m.played && as > hs;
  const home = getTeam(m.home);
  const away = getTeam(m.away);

  const teamLine = (team, teamId, won, score) => {
    const name = team ? `${team.name}` : (teamId || '');
    const cls = won ? 'winner' : (!m.played ? '' : 'loser');
    return `<div class="ko-team ${cls}">
      <span class="ko-team-name">${name || '<span class="ko-tbd">TBD</span>'}</span>
      ${m.played ? `<span class="ko-score">${score}</span>` : ''}
    </div>`;
  };

  const div = document.createElement('div');
  div.className = 'ko-match';
  div.style.marginBottom = '8px';
  div.innerHTML =
    teamLine(home, m.home, homeWon, hs) +
    teamLine(away, m.away, awayWon, as);
  return div;
}

function renderBracketVisual(el, data) {
  const eliminatedInKO = getEliminatedTeams(data);

  // Helper to render a single team slot in bracket
  function teamSlot(teamId, opponentId, matchData, isWinner) {
    const team = getTeam(teamId);

    const score = matchData && matchData.played
      ? (isWinner ? Math.max(parseInt(matchData.homeScore)||0, parseInt(matchData.awayScore)||0)
                  : Math.min(parseInt(matchData.homeScore)||0, parseInt(matchData.awayScore)||0))
      : '';

    // Determine if this team specifically won
    let actualWinner = false;
    if (matchData && matchData.played) {

  // Use a positioned container approach for bracket lines
  const MATCH_H = 48;    // height of a match box (2 teams × ~22px + border)
  const COL_W = 124;     // column width
  const ROW_UNIT = 8;    // base spacing unit
  const GAP = 6;         // gap between matches

  // We'll use a canvas-free approach: absolutely positioned divs in a relative container
  const container = document.createElement('div');
  container.style.cssText = `position:relative; overflow-x:auto; overflow-y:visible; -webkit-overflow-scrolling:touch; margin:0 -14px; padding:0 14px 16px;`;

  const COLS = 9;
  const TOTAL_W = COLS * COL_W + 20;

  // Total height: R32 has 8 matches per side. Each match = 48px + spacing between groups
  // Left R32: 8 matches. Spacing: within group=gap, between groups=larger
  // Layout heights for each round on the left: R32=8 matches, R16=4, QF=2, SF=1, Final=1
  // Spacing: R32 pairs are spaced so they feed naturally into R16

  // Let's compute positions mathematically
  // The left R32 matches occupy the full height, pairs connected to R16
  // Total bracket height determined by R32 count

  const TOTAL_ROWS = 8; // R32 matches per side
  const MATCH_BOX_H = 46;
  const INNER_GAP = 4;   // gap within a pair
  const OUTER_GAP = 16;  // gap between pairs

  // Height of a "pair" of R32 matches (feeds into one R16 match)
  const PAIR_H = MATCH_BOX_H * 2 + INNER_GAP + OUTER_GAP;

  const colColors = ['var(--muted)','var(--muted)','var(--muted)','var(--muted)','var(--gold)','var(--muted)','var(--muted)','var(--muted)','var(--muted)'];
  colLabels.forEach((label, i) => {

    h.textContent = label;
    inner.appendChild(h);

  // Helper: place a match box
  function placeMatch(matchId, col, topPx) {
    const m = getMatchData(data, matchId);
    const home = getTeam(m.home);
    const away = getTeam(m.away);
    const hs = m.played ? (parseInt(m.homeScore)||0) : null;
    const as = m.played ? (parseInt(m.awayScore)||0) : null;
    const homeWon = m.played && hs > as;
    const awayWon = m.played && as > hs;

    const div = document.createElement('div');
    div.style.cssText = `position:absolute; left:${col*COL_W+2}px; top:${HEADER_H+topPx}px; width:${COL_W-8}px; border:1px solid var(--card-border); border-radius:6px; overflow:hidden; background:var(--card-bg); cursor:pointer; transition: border-color 0.15s;`;
    div.onmouseenter = () => div.style.borderColor = 'var(--gold)';
    div.onmouseleave = () => div.style.borderColor = 'var(--card-border)';

    const makeTeam = (teamId, won, lost, score) => {
      const t = getTeam(teamId);
      const name = t ? t.name : (teamId || '—');
      const d = document.createElement('div');
      d.style.cssText = `display:flex; align-items:center; justify-content:space-between; padding:4px 7px; font-size:10px; min-height:23px; gap:3px; border-bottom:1px solid var(--card-border);${won?' background:rgba(240,180,41,0.14); color:var(--gold); font-weight:700;':lost?' color:#3d5545;':''}`;

      return d;
    };

    div.appendChild(makeTeam(m.home, homeWon, !homeWon && m.played, hs));
    const b2 = makeTeam(m.away, awayWon, !awayWon && m.played, as);
    b2.style.borderBottom = 'none';

      if (adminAuthed) openMatchEditor(matchId);

    inner.appendChild(div);
    return HEADER_H + topPx + MATCH_BOX_H / 2; // return center Y of this match
  }

  // Helper: draw connector line
  function hLine(x1, x2, y) {
    const d = document.createElement('div');
    d.style.cssText = `position:absolute; left:${x1}px; top:${y}px; width:${x2-x1}px; height:1px; background:var(--card-border);`;
    inner.appendChild(d);

  function vLine(x, y1, y2) {
    const d = document.createElement('div');
    d.style.cssText = `position:absolute; left:${x}px; top:${y1}px; width:1px; height:${y2-y1}px; background:var(--card-border);`;
    inner.appendChild(d);
  }

  // Layout computation
  // Left side: matches in col 0 (R32), col 1 (R16), col 2 (QF), col 3 (SF)
  // Right side: matches in col 8, 7, 6, 5
  // Center: col 4 = Final

  // R32 left: 8 matches arranged in 4 pairs
  // Pair spacing: each pair occupies PAIR_H pixels
  const leftR32Ids  = ['r32_L1','r32_L2','r32_L3','r32_L4','r32_L5','r32_L6','r32_L7','r32_L8'];
  const rightR32Ids = ['r32_R1','r32_R2','r32_R3','r32_R4','r32_R5','r32_R6','r32_R7','r32_R8'];
  const leftR16Ids  = ['r16_L1','r16_L2','r16_L3','r16_L4'];
  const rightR16Ids = ['r16_R1','r16_R2','r16_R3','r16_R4'];
  const leftQFIds   = ['qf_L1','qf_L2'];
  const rightQFIds  = ['qf_R1','qf_R2'];

  // Compute Y positions for R32 matches
  // Pair 0: matches 0,1 → Y = 0, MATCH_BOX_H + INNER_GAP
  // Pair 1: matches 2,3 → Y = PAIR_H, PAIR_H + MATCH_BOX_H + INNER_GAP
  // etc.

  function pairTopY(pairIdx) {
    return pairIdx * PAIR_H;
  }
  function matchTopY(matchIdx) {
    const pairIdx = Math.floor(matchIdx / 2);
    const posInPair = matchIdx % 2;
    return pairTopY(pairIdx) + posInPair * (MATCH_BOX_H + INNER_GAP);
  }

  // ── Place Left R32 ──
  const leftR32CenterYs = leftR32Ids.map((mid, i) => placeMatch(mid, 0, matchTopY(i)));

  // ── Place Right R32 ──
  const rightR32CenterYs = rightR32Ids.map((mid, i) => placeMatch(mid, 8, matchTopY(i)));

  // ── R16 Left: each match's Y is midpoint of its two feeder matches ──
  const leftR16CenterYs = leftR16Ids.map((mid, i) => {
    const top = leftR32CenterYs[i*2];
    const bot = leftR32CenterYs[i*2+1];
    const midY = (top + bot) / 2 - MATCH_BOX_H / 2 - HEADER_H;
    const centerY = placeMatch(mid, 1, midY);
    // Connector lines
    const matchRight = 1*COL_W + (COL_W-8);
    const prevRight  = 0*COL_W + (COL_W-8);
    hLine(prevRight+2, 1*COL_W+2, top);
    hLine(prevRight+2, 1*COL_W+2, bot);
    vLine(1*COL_W+2-6, top, bot);
    hLine(1*COL_W+2-6, 1*COL_W+2, centerY);
    return centerY;
  });

  // ── R16 Right ──
  const rightR16CenterYs = rightR16Ids.map((mid, i) => {
    const top = rightR32CenterYs[i*2];
    const bot = rightR32CenterYs[i*2+1];
    const midY = (top + bot) / 2 - MATCH_BOX_H / 2 - HEADER_H;
    const centerY = placeMatch(mid, 7, midY);
    const prevLeft = 8*COL_W;
    hLine(7*COL_W+(COL_W-8)+2, prevLeft, top);
    hLine(7*COL_W+(COL_W-8)+2, prevLeft, bot);
    vLine(prevLeft, top, bot);
    hLine(7*COL_W+(COL_W-8)+2, prevLeft, centerY);
    return centerY;
  });

  // ── QF Left ──
  const leftQFCenterYs = leftQFIds.map((mid, i) => {
    const top = leftR16CenterYs[i*2];
    const bot = leftR16CenterYs[i*2+1];
    const midY = (top + bot) / 2 - MATCH_BOX_H / 2 - HEADER_H;
    const centerY = placeMatch(mid, 2, midY);
    const prevRight = 1*COL_W+(COL_W-8);
    hLine(prevRight+2, 2*COL_W+2, top);
    hLine(prevRight+2, 2*COL_W+2, bot);
    vLine(2*COL_W+2-6, top, bot);
    hLine(2*COL_W+2-6, 2*COL_W+2, centerY);
    return centerY;
  });

  // ── QF Right ──
  const rightQFCenterYs = rightQFIds.map((mid, i) => {
    const top = rightR16CenterYs[i*2];
    const bot = rightR16CenterYs[i*2+1];
    const midY = (top + bot) / 2 - MATCH_BOX_H / 2 - HEADER_H;
    const centerY = placeMatch(mid, 6, midY);
    const prevLeft = 7*COL_W;
    hLine(6*COL_W+(COL_W-8)+2, prevLeft, top);
    hLine(6*COL_W+(COL_W-8)+2, prevLeft, bot);
    vLine(prevLeft, top, bot);
    hLine(6*COL_W+(COL_W-8)+2, prevLeft, centerY);
    return centerY;
  });

  // ── SF Left ──
  const sfLtop = leftQFCenterYs[0];
  const sfLbot = leftQFCenterYs[1];
  const sfLmidY = (sfLtop + sfLbot) / 2 - MATCH_BOX_H / 2 - HEADER_H;
  const sfLcenterY = placeMatch('sf_L', 3, sfLmidY);
  hLine(2*COL_W+(COL_W-8)+2, 3*COL_W+2, sfLtop);
  hLine(2*COL_W+(COL_W-8)+2, 3*COL_W+2, sfLbot);
  vLine(3*COL_W+2-6, sfLtop, sfLbot);
  hLine(3*COL_W+2-6, 3*COL_W+2, sfLcenterY);

  // ── SF Right ──
  const sfRtop = rightQFCenterYs[0];
  const sfRbot = rightQFCenterYs[1];
  const sfRmidY = (sfRtop + sfRbot) / 2 - MATCH_BOX_H / 2 - HEADER_H;
  const sfRcenterY = placeMatch('sf_R', 5, sfRmidY);
  hLine(5*COL_W+(COL_W-8)+2, 6*COL_W, sfRtop);
  hLine(5*COL_W+(COL_W-8)+2, 6*COL_W, sfRbot);
  vLine(6*COL_W, sfRtop, sfRbot);
  hLine(5*COL_W+(COL_W-8)+2, 6*COL_W, sfRcenterY);

  // ── FINAL ──
  const finalMidY = (sfLcenterY + sfRcenterY) / 2 - MATCH_BOX_H / 2 - HEADER_H;
  const finalCenterY = placeMatch('final', 4, finalMidY);
  // Trophy above final
  const trophy = document.createElement('div');
  trophy.style.cssText = `position:absolute; left:${4*COL_W}px; top:${HEADER_H + finalMidY - 32}px; width:${COL_W-8}px; text-align:center; font-size:20px;`;
  trophy.textContent = '🏆';
  inner.appendChild(trophy);
  // Connectors from SF to Final
  hLine(3*COL_W+(COL_W-8)+2, 4*COL_W+2, sfLcenterY);
  hLine(4*COL_W+(COL_W-8)+2, 5*COL_W, sfRcenterY);
  vLine(4*COL_W+2-6, sfLcenterY, finalCenterY);
  vLine(5*COL_W, sfRcenterY, finalCenterY);

  // ── 3rd place match ──
  const thirdY = finalMidY + MATCH_BOX_H + 24;
  placeMatch('third', 4, thirdY);
  const thirdLabel = document.createElement('div');
  thirdLabel.style.cssText = `position:absolute; left:${4*COL_W}px; top:${HEADER_H + thirdY - 18}px; width:${COL_W-8}px; text-align:center; font-size:9px; color:var(--muted); text-transform:uppercase; letter-spacing:1px;`;
  thirdLabel.textContent = '3rd Place';
  inner.appendChild(thirdLabel);

  // Update total height
  inner.style.height = `${HEADER_H + thirdY + MATCH_BOX_H + 20}px`;

  container.appendChild(inner);
  wrapper.appendChild(container);
  el.appendChild(wrapper);

  // Scroll hint
  const hint = document.createElement('div');
  hint.style.cssText = 'text-align:center; font-size:11px; color:var(--muted); padding:6px 0 2px; letter-spacing:0.5px;';
  hint.textContent = '← scroll to see full bracket →';
  el.appendChild(hint);

  // Admin quick-edit modal
  window.openMatchEditor = function(matchId) {
    const existing = document.getElementById('match-editor-modal');
    if (existing) existing.remove();

    const data = getData();
    const m = getMatchData(data, matchId);
    const home = getTeam(m.home);
    const away = getTeam(m.away);

    const modal = document.createElement('div');
    modal.id = 'match-editor-modal';
    modal.style.cssText = `position:fixed; inset:0; background:rgba(0,0,0,0.75); z-index:999; display:flex; align-items:center; justify-content:center; padding:20px;`;
    modal.innerHTML = `
      <div style="background:var(--card-bg); border:1px solid var(--card-border); border-radius:12px; padding:20px; width:100%; max-width:340px;">
        <div style="font-family:var(--font-display); font-size:18px; color:var(--gold); margin-bottom:14px; letter-spacing:1px;">Edit Match</div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:10px;">
          <div>
            <label style="margin-bottom:4px; margin-top:0;">Home Team</label>
            <select id="me-home" style="font-size:13px;">
              <option value="">— TBD —</option>
              ${ALL_TEAMS.map(t=>`<option value="${t.id}" ${t.id===m.home?'selected':''}>${t.name}</option>`).join('')}
            </select>
          </div>
          <div>
            <label style="margin-bottom:4px; margin-top:0;">Away Team</label>
            <select id="me-away" style="font-size:13px;">
              <option value="">— TBD —</option>
              ${ALL_TEAMS.map(t=>`<option value="${t.id}" ${t.id===m.away?'selected':''}>${t.name}</option>`).join('')}
            </select>
          </div>
        </div>
        <div style="display:grid; grid-template-columns:1fr auto 1fr; gap:8px; align-items:center; margin-bottom:14px;">
          <input type="number" id="me-hs" value="${m.homeScore||''}" placeholder="—" class="score-input" style="width:100%!important; text-align:center;">
          <span class="vs-label" style="font-size:16px;">–</span>
          <input type="number" id="me-as" value="${m.awayScore||''}" placeholder="—" class="score-input" style="width:100%!important; text-align:center;">
        </div>
        <div style="display:flex; gap:8px;">
          <button class="btn full" id="me-save" style="margin-top:0;">Save</button>
          <button class="btn secondary full" id="me-cancel" style="margin-top:0;">Cancel</button>
        </div>
      </div>`;

    document.body.appendChild(modal);

    document.getElementById('me-cancel').onclick = () => modal.remove();
    modal.onclick = (e) => { if (e.target === modal) modal.remove(); };

    document.getElementById('me-save').onclick = async () => {
      const d = getData();

function popularity(el) {
  const data = getData();
  el.innerHTML = `<h2 class="page-title">Pick Popularity</h2>`;
  if (!canViewPicks()) {
    el.innerHTML += `
      <div class="card">
        <div class="card-title">Pick Popularity Locked</div>
        <p>
          Pick popularity becomes visible after you submit an entry
          or once the tournament begins.
        </p>
      </div>
    `;
    return;
  }
  if (data.participants.length === 0) {
    el.innerHTML += `<div class="empty-state">No participants yet.</div>`;
    return;
  }

  const counts = {};
  data.participants.forEach(p => p.picks.forEach(id => counts[id] = (counts[id] || 0) + 1));
  const maxCount = Math.max(...Object.values(counts), 1);
  const total = data.participants.length;

  const sorted = ALL_TEAMS.map(t => ({ t, count: counts[t.id] || 0 }))
    .filter(x => x.count > 0)
    .sort((a, b) => b.count - a.count);

  const unpicked = ALL_TEAMS.filter(t => !counts[t.id]);

  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <div style="font-size:12px; color:var(--muted); margin-bottom:12px;">${total} participant${total !== 1 ? 's' : ''} entered</div>
    ${sorted.map(({ t, count }) => {
      const tier = TEAMS.tier1.find(x => x.id === t.id) ? 'tier-1' :
                   TEAMS.tier2.find(x => x.id === t.id) ? 'tier-2' : 'tier-3';
      return `
        <div class="pop-row">
          
          <span style="flex:1; font-size:13px;">${t.name} <span class="tier-badge ${tier}" style="vertical-align:2px">${tier.replace('tier-','T')}</span></span>
          <div class="pop-bar-wrap"><div class="pop-bar" style="width:${Math.round(count/maxCount*100)}%"></div></div>
          <span class="pop-count">${count}</span>
        </div>`;
    }).join('')}
    ${unpicked.length > 0 ? `
      <div style="margin-top:12px; padding-top:12px; border-top:1px solid var(--card-border);">
        <div style="font-size:11px; color:var(--muted); margin-bottom:6px; text-transform:uppercase; letter-spacing:0.7px;">Not picked</div>
        <div class="tag-row">${unpicked.map(t => `<span class="tag" style="opacity:0.5">${t.name}</span>`).join('')}</div>
      </div>` : ''}`;
  el.appendChild(card);
}

function adminGroupMatches(el) {
  const data = getData();
  el.innerHTML = '';

  Object.entries(GROUPS).forEach(([grp, teamIds]) => {
    const card = document.createElement('div');
    card.className = 'card';

    // Generate all match combos
    const pairs = [];
    for (let i = 0; i < teamIds.length; i++)
      for (let j = i + 1; j < teamIds.length; j++)
        pairs.push([teamIds[i], teamIds[j]]);

    card.innerHTML = `
      <div style="font-family:var(--font-display); font-size:16px; color:var(--gold); letter-spacing:2px; margin-bottom:8px;">GROUP ${grp}</div>
      ${pairs.map(([h, a]) => {
        const mid = `${h}_${a}`;
        const m = data.groupMatches[mid] || { home: h, away: a, homeScore: '', awayScore: '', played: false };
        const home = getTeam(h), away = getTeam(a);
        return `
          <div class="score-row" data-mid="${mid}" data-home="${h}" data-away="${a}">
            <div class="score-team">${home.name}</div>
            <input class="score-input" type="number" min="0" max="20" value="${m.homeScore}" placeholder="—" data-role="home">
            <div class="vs-label">vs</div>
            <input class="score-input" type="number" min="0" max="20" value="${m.awayScore}" placeholder="—" data-role="away">
            <div class="score-team">${away.name}</div>
          </div>`;
      }).join('')}
    `;
    el.appendChild(card);
  });

  const saveBtn = document.createElement('button');
  saveBtn.className = 'btn full';
  saveBtn.textContent = 'Save All Group Scores';
  saveBtn.onclick = async () => {
    const data = getData();
    el.querySelectorAll('.score-row').forEach(row => {
      const mid = row.dataset.mid;
      const h = row.dataset.home, a = row.dataset.away;
      const hs = row.querySelector('[data-role="home"]').value;
      const as = row.querySelector('[data-role="away"]').value;
      const played = hs !== '' && as !== '';
      data.groupMatches[mid] = { home: h, away: a, homeScore: hs, awayScore: as, played };
    });
    await saveData(data);
    showFlash(el, 'Group scores saved!');
  };
  el.appendChild(saveBtn);
}

  });

  const exportBtn = document.createElement('button');
  exportBtn.className = 'btn secondary full';
  exportBtn.textContent = 'Export Data (JSON)';
  exportBtn.onclick = () => {
    const blob = new Blob([JSON.stringify(getData(), null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'worldcup-pool-data.json';
    a.click();
  };
  el.appendChild(exportBtn);

  const importArea = document.createElement('div');
  importArea.className = 'card';
  importArea.style.marginTop = '12px';
  importArea.innerHTML = `
    <div class="card-title">Import Data</div>
    <p style="font-size:12px; color:var(--muted); margin-bottom:8px;">Paste JSON from an export to restore data on a new device.</p>
    <textarea id="import-json" rows="4" placeholder='{"participants":[]...}'></textarea>
    <button class="btn full" id="do-import">Import</button>`;
  el.appendChild(importArea);

  document.getElementById('do-import').onclick = async () => {
    try {
      const d = JSON.parse(document.getElementById('import-json').value);
      await saveData(d);
      showFlash(el, 'Data imported!');
      adminManagePicks(el);
    } catch {
      showFlash(el, 'Invalid JSON', true);
    }
  };
}

function showFlash(parent, msg, err = false) {
  const f = document.createElement('div');
  f.className = `alert ${err ? 'error' : 'success'}`;
  f.textContent = msg;
  f.style.marginTop = '10px';
  parent.appendChild(f);
  setTimeout(() => f.remove(), 3000);
}

// Boot
async function boot() {
  await loadData();
  render();
}

boot();
</script>
</body>
</html>
